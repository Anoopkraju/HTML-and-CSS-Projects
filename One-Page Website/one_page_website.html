<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My One Page Website</title>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#home">HOME</a> |
    <a href="#gallery">GALLERY</a> |
    <a href="#video">VIDEO</a> |
    <a href="#contact">CONTACT</a>
</nav>

<hr>

<!-- HOME -->
<section id="home">
    <h1>Welcome to My Website</h1>
    <p>This is my one-page website created using HTML.</p>
</section>

<hr>

<!-- GALLERY -->
<section id="gallery">
    <h2>Gallery</h2>

    <img src="https://via.placeholder.com/200" alt="Image 1">
    <img src="https://via.placeholder.com/200" alt="Image 2">
    <img src="https://via.placeholder.com/200" alt="Image 3">
</section>

<hr>

<!-- VIDEO -->
<section id="video">
    <h2>Video</h2>

    <iframe width="400" height="250"
    src="https://www.youtube.com/embed/tgbNymZ7vqY">
    </iframe>
</section>

<hr>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>

    <form>
        Name:<br>
        <input type="text"><br><br>

        Email:<br>
        <input type="email"><br><br>

        Message:<br>
        <input type="text"><br><br>

        <input type="submit" value="Submit">
    </form>
</section>

<hr>

<!-- FOOTER -->
<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
