<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My One Page Website</title>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#home">HOME</a> |
    <a href="#gallery">GALLERY</a> |

</nav>

<hr>

<section id="home">

</section>

<hr>

<!-- GALLERY -->
<section id="gallery">

    <img src="1.jpg" alt="Image 1">

   <video width="400" controls>
    <source src="video.mp4" type="video/mp4">
</video>
</section>

<hr>

    <form>
        Name:<br>
        <input type="text"><br><br>

        <input type="email"><br><br>

</section>

<!-- FOOTER -->
<footer>
    <p>AQUAFINA</p>
</footer>

</html>
